  - question: "Are there any sites of active extravasation in the liver?"
    positive:
      - "Active extravasation is identified within the liver, indicating ongoing hepatic hemorrhage."
      - "A focus of active contrast extravasation is present in the liver parenchyma."
      - "There is a jet of contrast material pooling within the hepatic parenchyma consistent with active bleeding."
    negative:
