  - question: "Is there epithelioid hemangioendothelioma?"
    positive:
      - "Epithelioid hemangioendothelioma is present with peripheral hepatic lesions showing a target-like appearance."
      - "Hepatic epithelioid hemangioendothelioma is identified, with subcapsular coalescent nodules and capsular retraction."
      - "There are multiple peripheral hepatic lesions with a lollipop sign and concentric enhancement rings consistent with epithelioid hemangioendothelioma."
    negative:
