  - question: "Is there fibrolamellar carcinoma?"
    positive:
      - "Fibrolamellar carcinoma is present, appearing as a large well-defined hepatic mass with a central calcified scar."
      - "A fibrolamellar hepatocellular carcinoma is identified, with a heterogeneous mass and characteristic central scar."
      - "There is a large lobulated hepatic mass with a stellate calcified central scar in a non-cirrhotic liver, consistent with fibrolamellar carcinoma."
    negative:
